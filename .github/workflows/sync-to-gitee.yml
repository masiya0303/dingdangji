name: Sync to Gitee

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to Gitee
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/dingdangji.git

          git push --force gitee main
